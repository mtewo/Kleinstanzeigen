

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head> <link rel="stylesheet" th:href="@{/css/benutzer.css}">
        
    </head>
    <body>
        <div th:replace="~{fragments/kopffuss :: kopf}"></div>
        
        <main>
            <!--<h1>Benutzer <span th:text="${loginname}">Platzhalter</span> bearbeiten...</h1>-->
            <h2 th:text="#{benutzer.bearbeiten.titel(${loginname})}">Platzhalter</h2>
            <form th:object="${formular}" method="post" th:action="@{'/admin/benutzer/' + ${loginname}}">
                <input type="hidden" th:field="*{version}">
            
                <div class="feld">
                    <label th:text="#{benutzer.name}">Name:</label>
                    <div class="input-bereich">
                        <input type="text" th:field="*{name}" th:classappend="${#fields.hasErrors('name')} ? 'fehler'">
                        <span class="fehler-text" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
                    </div>
                </div>

                <div class="feld">
                    <label th:text="#{benutzer.email}">E-Mail:</label>
                    <div class="input-bereich">
                        <input type="text" th:field="*{eMail}" th:classappend="${#fields.hasErrors('eMail')} ? 'fehler'">
                        <span class="fehler-text" th:if="${#fields.hasErrors('eMail')}" th:errors="*{eMail}"></span>
                    </div>
                </div>

                <div class="feld">
                    <label th:text="#{benutzer.adresse}">Adresse:</label>
                    <div class="input-bereich">
                        <input type="text" th:field="*{adresse}" th:classappend="${#fields.hasErrors('adresse')} ? 'fehler'">
                        <span class="fehler-text" th:if="${#fields.hasErrors('adresse')}" th:errors="*{adresse}"></span>
                    </div>
                </div>

                <div class="feld">
                    <label th:text="#{benutzer.rolle}">Rolle:</label>
                    <div class="input-bereich">
                        <select th:field="*{rolle}">
                            <option value="" th:text="#{benutzer.rolle.bitte_wählen}"> bitte wählen</option>
                            <option value="ADMINISTRATOR" th:text="#{benutzer.rolle.administrator}">Administrator</option>
                            <option value="ANBIETER" th:text="#{benutzer.rolle.anbieter}">Anbieter</option>
                            <option value="TESTER" th:text="#{benutzer.rolle.tester}">Tester</option>
                        </select>
                    </div>
                </div>

                <div class="feld">
                    <label th:text="#{benutzer.losung}">Passwort:</label>
                    <div class="input-bereich">
                        <input type="password" th:field="*{passwort}" th:classappend="${#fields.hasErrors('passwort')} ? 'fehler'">
                        <span class="fehler-text" th:if="${#fields.hasErrors('passwort')}" th:errors="*{passwort}"></span>
                    </div>
                </div>

                <div class="feld">
                    <label th:text="#{benutzer.losungwh}">Passwort (Wiederholung):</label>
                    <div class="input-bereich">
                        <input type="password" th:field="*{passwortWiederholung}" th:classappend="${#fields.hasErrors('passwortWiederholung')} ? 'fehler'">
                        <span class="fehler-text" th:if="${#fields.hasErrors('passwortWiederholung')}" th:errors="*{passwortWiederholung}"></span>
                    </div>
                </div>

                <div class="feld-checkbox">
                    <label th:text="#{benutzer.aktiviert}">aktiviert</label>
                    <input type="checkbox" th:field="*{aktiviert}">
                </div>

                <div class="buttons">
                    <input type="reset" th:value="#{benutzer.liste.zeile.abbrechen}">
                    <input type="submit" th:value="#{benutzer.liste.zeile.ok}">
                </div>

            </form>

            <h3 th:text="#{benutzer.bestellungen.titel}">Bestellungen</h3>
            <ul>
                <li th:each="anzeige : ${bestellungen}" 
                    th:text="${anzeige.titel}">Titel</li>
            </ul>
        </main>
        <div th:replace="~{fragments/kopffuss :: fuss}"></div>
    </body>
</html>
